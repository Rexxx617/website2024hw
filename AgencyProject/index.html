<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">

    <!-- Link to Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <link href="css/style.css" rel="stylesheet"> 

    <title>Zaun pics Bootstrap Carousel</title>
    
    <!-- Custom Fonts -->
    <link href="vendor/font-awesome/css/font-awesome.min.css" rel="stylesheet" type="text/css">
    
    <!-- Theme CSS -->
    <link href="css/agency.min.css" rel="stylesheet">

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body id="page-top" class="index">

  <div class="sticky">
    <nav class="navbar">
      <ul>
        <li><a href="#ZAUN" class="nav-link">ZAUN</a></li>
        <li><a href="#PILTOOVER" class="nav-link">PILTOOVER</a></li>
        <li><a href="#CHARACTER" class="nav-link">CHARACTER</a></li>
        <li><a href="#SKETCH" class="nav-link">SKETCH</a></li>
      </ul>
    </nav>
  </div>  

  
  <div class="header">
    <h1>
      Concept Art of Arcane <span class="season">Season One</span>
    </h1>
  </div>
    
  <section id="ZAUN" class="ZAUN">
    <h1 class="section-title">ZAUN</h1>
    <h2 class="section-title">WELCOME TO ZAUN!</h2>
  </section>

  <div class="section-zaun">    
    <div id="carouselExampleInterval" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-inner">
        <div class="carousel-item active" data-bs-interval="4000">
          <img src="imGG/26.jpg" class="d-block w-100" alt="Zaun Image 1">
        </div>
        <div class="carousel-item" data-bs-interval="4000">
          <img src="imGG/17.jpg" class="d-block w-100" alt="Zaun Image 2">
        </div>
        <div class="carousel-item">
          <img src="imGG/23.jpg" class="d-block w-100" alt="Zaun Image 3">
        </div>
        <div class="carousel-item">
          <img src="imGG/21.jpg" class="d-block w-100" alt="Zaun Image 4">
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleInterval" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleInterval" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
  </div> 

</body>    

</html>
